<!DOCTYPE html>
<html>
<head>
    <title>Test Firebase Auth</title>
</head>
<body>
    <h1>Firebase Auth Test</h1>
    <button onclick="testSignup()">Test Signup</button>
    <div id="result"></div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, createUserWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

        const firebaseConfig = {
            apiKey: "AIzaSyDwbQz09uup2aSAbl381hJN2aH-_kjSIDg",
            authDomain: "petut-pet.firebaseapp.com",
            projectId: "petut-pet",
            storageBucket: "petut-pet.firebasestorage.app",
            messagingSenderId: "572292474316",
            appId: "1:572292474316:web:1280a277451ef13d6d6969"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.testSignup = async function() {
            const result = document.getElementById('result');
            result.innerHTML = 'Testing...';
            
            try {
                const email = 'test' + Date.now() + '@test.com';
                const password = '123456';
                
                console.log('Creating user:', email);
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                
                result.innerHTML = '✅ Success! User created: ' + userCredential.user.uid;
                console.log('User created successfully:', userCredential.user);
            } catch (error) {
                result.innerHTML = '❌ Error: ' + error.message;
                console.error('Signup failed:', error);
            }
        };
    </script>
</body>
</html>
